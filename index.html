<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes & Calculator App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="notes-app">
        <h1>Notes App</h1>
        <form id="note-form">
            <input type="text" id="title" placeholder="Title" required>
            <textarea id="content" placeholder="Content" required></textarea>
            <button type="submit" id="submit-note">Create Note</button>
        </form>
        <div id="notes-container"></div>
    </div>

    <div class="calculator-app">
        <h1>Calculator</h1>
        <form id="calculator-form">
            <input type="number" id="num1" placeholder="First number" step="any" required>
            <select id="operation">
                <option value="add">Add (+)</option>
                <option value="subtract">Subtract (-)</option>
                <option value="multiply">Multiply (×)</option>
                <option value="divide">Divide (÷)</option>
            </select>
            <input type="number" id="num2" placeholder="Second number" step="any" required>
            <button type="submit" id="submit-calc">Calculate</button>
        </form>
        <div id="calc-result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
